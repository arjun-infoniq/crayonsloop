    <div class="modal" id="payModal">
      <div class="modal-box">
        <img src="images/logo.png" alt="Logo" />
        <span>Live</span>
        <h2>Garudan Thookkam Live</h2>
        <p>Pooram Special 2026</p>
        <h3>OFFER ₹10 & WATCH LIVE</h3>
        <br />
        <input
          type="tel"
          id="mobile"
          placeholder="Enter Mobile Number"
          required
        />
        <button onclick="startPayment()">Pay & Watch</button>
      </div>
    </div>

    <script>
      // const DEV_MODE = true;

      // window.onload = function () {

      //     document.getElementById("payModal").style.display = "none";
      //     document.getElementById("liveStream").style.display = "block";
      //     return;
      //   }

      function startPayment() {
        const mobile = document.getElementById("mobile").value;

        if (!mobile) {
          alert("Please enter mobile number");
          return;
        }

        var options = {
          key: "rzp_live_S6rAumTg3wQcmz",
          amount: 1000, // ₹10 in paise
          currency: "INR",
          name: "Live Event",
          description: "Live Stream Access",
          handler: function (response) {
            // Unlock stream
            document.getElementById("payModal").style.display = "none";
            document.getElementById("liveStream").style.display = "block";
          },
          prefill: {
            contact: mobile,
          },
          theme: {
            color: "#528ff0",
          },
        };

        var rzp = new Razorpay(options);
        rzp.open();
      }
    </script>
